<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>awesome QR</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#89b8e0"/>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
  <div class="app-header"><div class="bar-left"><img src="logo.png" alt="Logo" style="height:36px;object-fit:contain;" /></div><div class="bar-center"><span>awesome QR</span></div><div class="bar-right"><span style="font-size:1.3rem">❤️</span></div></div>
  <main>
    <form id="appForm" class="layout-sidebar" onsubmit="return handleSubmit(event)">
<div class="grid-cell"><label class="field-label" for="field_1">QR Scanner</label><button class="btn qr-scan-btn" id="field_1" onclick="startQRScan('field_1','text','Scanned successfully!','')">Scan QR Code 📷</button><div class="qr-viewport" id="field_1_viewport" style="display:none"><video id="field_1_video" autoplay playsinline style="width:100%;border-radius:8px"></video><button class="btn" onclick="stopQRScan('field_1')" style="margin-top:6px;background:#c33">Stop Camera</button></div><div class="qr-result" id="field_1_result" style="display:none"></div>
<label class="field-label" for="field_2">QR</label><input type="text" class="input-field" id="field_2" placeholder="" /></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>
<div class="grid-cell"></div>

    </form>
    <div id="errorBox" class="error-box" style="display:none"></div>
    <div id="successBox" class="success-box" style="display:none">Saved!</div>
    <section id="dataDisplay" class="data-display"><h2>Saved Entries</h2><div id="entriesList"></div></section>
  </main>
  <div class="app-footer"><div class="bar-left"><img src="logo.png" alt="Logo" style="height:36px;object-fit:contain;" /></div><div class="bar-center"></div><div class="bar-right"><a href="https://ddsdsd.com" style="color:inherit;text-decoration:underline" target="_blank" rel="noopener">Policy</a></div></div>
  <script src="app.js"></script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
